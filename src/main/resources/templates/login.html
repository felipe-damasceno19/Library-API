<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-sm p-4" style="width: 100%; max-width: 360px;">
    <h5 class="card-title text-center mb-4">Entrar</h5>

    <form action="/login" method="post" th:action="@{/login}">
      <div class="mb-3">
        <label for="username" class="form-label">Usuário</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="seu usuário" required/>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Senha</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>

      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>
  </div>

</body>
</html>
